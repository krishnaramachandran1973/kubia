management:
  endpoints:
    enabled-by-default: true
    web:      exposure:        include:        - "*"
spring:  datasource:
    password: sa
    username: sa
    url: jdbc:h2:mem:kubia
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true    